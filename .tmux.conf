# === Mouse ===

# scroll, click to select panes/windows, drag borders to resize
set -g mouse on

# === Windows & panes ===

# number windows from 1 (matches keyboard layout)
set -g base-index 1
# number panes from 1 as well
setw -g pane-base-index 1
# close gaps in window numbers when one is killed
set -g renumber-windows on

# === Copy mode & clipboard ===

# vi keys in copy mode (Space to select, Enter to copy, h/j/k/l to move)
setw -g mode-keys vi
# sync copies to the system clipboard via OSC 52 escape sequences
set -s set-clipboard on

# === Terminal & colors ===

# proper terminfo for tmux (correct italics and other capabilities)
set -s default-terminal "tmux-256color"
# advertise 24-bit color support for every outer terminal
set -as terminal-overrides ",*:RGB"
# let apps pass escape sequences through to the terminal (kitty graphics etc. in ghostty)
set -g allow-passthrough on
# keep OSC 8 clickable hyperlinks working inside tmux
set -as terminal-features ",*:hyperlinks"

# === Prefix ===

# remap prefix to C-a (screen-style); shadows readline's beginning-of-line
unbind C-b
set -g prefix C-a
# pressing C-a twice sends a literal C-a through to the shell
bind C-a send-prefix

# === Key bindings ===

# prefix + r reloads this config; shadows the built-in refresh-client binding
bind r source-file ~/.tmux.conf \; display-message "Sourced ~/.tmux.conf!"

# mnemonic splits on unbound keys (defaults " and % still work)
# prefix + v splits side by side (like vim's :vsplit)
bind v split-window -h
# prefix + b splits below
bind b split-window -v

# C-h/j/k/l switch panes without prefix, passing through to (n)vim so the same
# keys navigate vim windows and tmux panes seamlessly (matches nvim keymaps.lua);
# shadows C-h (backspace) and C-l (clear screen) in the shell
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# === Sensible defaults (tmux-sensible) ===

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0
# increase scrollback buffer size
set -g history-limit 50000
# tmux messages are displayed for 4 seconds
set -g display-time 4000
# refresh 'status-left' and 'status-right' more often
set -g status-interval 5
# emacs key bindings in tmux command prompt are better than vi keys, even for vim users
set -g status-keys emacs
# focus events enabled for terminals that support them
set -g focus-events on
# super useful when using "grouped sessions" and multi-monitor setup
set -wg aggressive-resize on
